<!DOCTYPE html>
<html lang="English">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card</title>

    <style>
      body {
        margin: 0;
        background: linear-gradient(135deg, #e9eef5, #f7f9fc);
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      /* CARD */
      .card {
        width: 100%;
        max-width: 500px;
        background: #fff;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        border: 1px solid #d6dce5;
      }

      /* HEADER */
      .header {
        background: linear-gradient(135deg, #1f4e79, #2f6ea5);
        height: 110px;
        position: relative;
      }

      /* PHOTO */
      .photo {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 4px solid #fff;
        object-fit: cover;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        top: 45px;
        background: #ddd;
      }

      /* TITLE */
      .title {
        margin-top: 70px;
        text-align: center;
        font-size: 18px;
        font-weight: 700;
        color: #1f4e79;
        letter-spacing: 1px;
      }

      /* CONTENT */
      .content {
        padding: 18px 18px 25px;
      }

      /* ROW */
      .row {
        display: flex;
        align-items: flex-start;
        padding: 8px 0;
        border-bottom: 1px solid #f0f0f0;
        font-size: 14px;
      }

      /* LABEL (fixed width for perfect alignment) */
      .label {
        width: 42%;
        font-weight: 600;
        color: #333;
      }

      /* VALUE (NO WRAP BREAKS, CLEAN ALIGNMENT) */
      .value {
        width: 58%;
        color: #444;
        text-align: left;
        word-break: break-word;
        overflow-wrap: anywhere;
        line-height: 1.3;
      }

      /* SPECIAL FIX FOR EMAIL & ADDRESS (NO WEIRD BREAK LOOK) */
      .value.long {
        font-size: 13px;
      }

      /* FOOTER */
      .footer {
        background: #f3f6fb;
        text-align: center;
        padding: 10px;
        font-size: 12px;
        color: #666;
        font-weight: 500;
      }

      /* MOBILE */
      @media (max-width: 420px) {
        .card {
          margin: 15px;
        }
        .row {
          font-size: 13px;
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="header">
        <img class="photo" src="./images/OIP.jpg" alt="Photo">
      </div>

      <div class="title">IDENTITY CARD</div>

      <div class="content">
        <div class="row">
          <div class="label">NAME</div>
          <div class="value">GODA RISHI KESH</div>
        </div>
        <div class="row">
          <div class="label">AGE</div>
          <div class="value">22</div>
        </div>
        <div class="row">
          <div class="label">SEX</div>
          <div class="value">MALE</div>
        </div>
        <div class="row">
          <div class="label">DISABILITY</div>
          <div class="value">NO</div>
        </div>
        <div class="row">
          <div class="label">PHONE</div>
          <div class="value">9640285165</div>
        </div>
        <div class="row">
          <div class="label">ALT PHONE</div>
          <div class="value">9640285163</div>
        </div>

        <!-- FIXED EMAIL -->
        <div class="row">
          <div class="label">EMAIL</div>
          <div class="value long">GODHADHANUSH@GMAIL.COM</div>
        </div>

        <!-- FIXED ADDRESS -->
        <div class="row">
          <div class="label">ADDRESS</div>
          <div class="value long"># 6/3,YSR KADAPA, MALLEMPALLI VILLAGE</div>
        </div>

        <div class="row">
          <div class="label">PROFESSION</div>
          <div class="value">DRIVING</div>
        </div>
        <div class="row">
          <div class="label">EXPERIENCE</div>
          <div class="value">5 YEARS</div>
        </div>
        <div class="row">
          <div class="label">LICENSE</div>
          <div class="value">HEAVY VEHICLE</div>
        </div>
      </div>

      <div class="footer">OFFICIAL DRIVING ID CARD • VERIFIED DOCUMENT</div>
    </div>
  </body>
</html>
